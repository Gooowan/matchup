name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [master]

env:
  REGISTRY: ghcr.io
  IMAGE_API: ghcr.io/gooowan/matchup/api
  IMAGE_MIGRATE: ghcr.io/gooowan/matchup/migrate
  DEPLOY_SHA: ${{ github.event.workflow_run.head_sha }}

jobs:
  build-images:
    name: Build & push Docker images
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_SHA }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push api
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          build-args: |
            SERVICE_NAME=api
            ARCHITECTURE=amd64
          tags: |
            ${{ env.IMAGE_API }}:latest
            ${{ env.IMAGE_API }}:${{ env.DEPLOY_SHA }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Build & push migrate
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.migrate
          push: true
          tags: |
            ${{ env.IMAGE_MIGRATE }}:latest
            ${{ env.IMAGE_MIGRATE }}:${{ env.DEPLOY_SHA }}
          cache-from: type=gha,scope=migrate
          cache-to: type=gha,mode=max,scope=migrate

  build-frontend:
    name: Build frontend
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_SHA }}

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: services/frontend/package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: services/frontend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: services/frontend
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: services/frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_HOSTNAME: ${{ secrets.VITE_HOSTNAME }}
          VITE_APP_VERSION: ${{ secrets.VITE_APP_VERSION }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}
          VITE_POSTHOG_HOST: ${{ secrets.VITE_POSTHOG_HOST }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_GOOGLE_IOS_CLIENT_ID: ${{ secrets.VITE_GOOGLE_IOS_CLIENT_ID }}
          VITE_GOOGLE_ANDROID_CLIENT_ID: ${{ secrets.VITE_GOOGLE_ANDROID_CLIENT_ID }}
        run: pnpm build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-${{ env.DEPLOY_SHA }}
          path: services/frontend/build/
          retention-days: 1

  deploy:
    name: Deploy to DigitalOcean
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    needs: [build-images, build-frontend]
    environment: production

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_SHA }}

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build-${{ env.DEPLOY_SHA }}
          path: ./frontend-build

      - name: Prepare droplet directories
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            mkdir -p ~/matchup/config/observability ~/matchup/scripts ~/matchup/secrets
            mkdir -p ~/matchup/services/frontend/build

      - name: Copy compose files to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          source: "compose.yml,compose.prod.yml,compose.observability.yml"
          target: "~/matchup/"

      - name: Copy observability config to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          source: "config/observability/"
          target: "~/matchup/config/observability/"
          strip_components: 2

      - name: Copy observability scripts to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          source: "scripts/observability-up.sh,scripts/benchmark.sh,scripts/health-check.sh,scripts/leave-all-clubs.sh"
          target: "~/matchup/scripts/"

      - name: Copy nginx config to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          source: "services/frontend/nginx.conf"
          target: "~/matchup/services/frontend/"
          strip_components: 2

      - name: Copy frontend build to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          source: "frontend-build/*"
          target: "~/matchup/services/frontend/build/"
          strip_components: 1

      - name: Pull images & restart services
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            set -e
            cd ~/matchup

            # Docker creates a directory when a bind-mount source file is missing
            if [ -d services/frontend/nginx.conf ]; then
              rm -rf services/frontend/nginx.conf
            fi
            mkdir -p services/frontend/build scripts secrets

            chmod +x scripts/observability-up.sh scripts/benchmark.sh scripts/health-check.sh scripts/leave-all-clubs.sh 2>/dev/null || true

            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            docker compose -f compose.yml -f compose.prod.yml pull api migrate
            docker compose -f compose.yml -f compose.prod.yml up -d --no-build
            docker compose -f compose.yml -f compose.prod.yml restart web

            # Observability is opt-in: run ./scripts/observability-up.sh --prod once METRICS_TOKEN is set in .env

            docker image prune -f
