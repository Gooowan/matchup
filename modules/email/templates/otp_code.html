{{define "otp-code"}}
<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MatchUp — Код підтвердження</title>
</head>
<body style="margin:0;padding:0;background:#dae1eb;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
    <table width="100%" cellpadding="0" cellspacing="0" style="background:#dae1eb;padding:40px 16px;">
        <tr><td align="center">
            <table width="480" cellpadding="0" cellspacing="0" style="max-width:480px;width:100%;background:#ffffff;border-radius:20px;overflow:hidden;">
                <tr>
                    <td align="center" style="padding:40px 40px 32px;background:#8984da;">
                        <div style="font-size:28px;font-weight:900;color:#ffffff;letter-spacing:-0.5px;">MatchUp</div>
                        <div style="font-size:13px;color:rgba(255,255,255,0.75);margin-top:4px;font-weight:500;">Знайди свого партнера</div>
                    </td>
                </tr>
                <tr>
                    <td style="padding:40px 40px 28px;">
                        <p style="margin:0 0 8px;font-size:22px;font-weight:800;color:#171717;">Твій код</p>
                        <p style="margin:0 0 32px;font-size:15px;color:#696969;font-weight:500;">Введи цей код для входу в MatchUp</p>
                        <div style="background:#f0f0f8;border-radius:16px;padding:28px;text-align:center;margin:0 0 28px;">
                            <span style="font-size:48px;font-weight:900;letter-spacing:10px;color:#8984da;">{{.Code}}</span>
                        </div>
                        <p style="margin:0;font-size:13px;color:#aeb4bc;font-weight:500;">Код дійсний {{.ExpiresIn}} хв · Якщо це не ти — просто ігноруй цей лист</p>
                    </td>
                </tr>
                <tr>
                    <td style="padding:20px 40px 32px;border-top:1px solid #f0f0f0;">
                        <p style="margin:0;font-size:12px;color:#aeb4bc;text-align:center;">MatchUp — платформа для пошуку партнера з танців</p>
                    </td>
                </tr>
            </table>
        </td></tr>
    </table>
</body>
</html>
{{end}}
