version: "2"
sql:
  - engine: "postgresql"
    queries: "./queries"
    schema: "../../build/combined_schema.sql"
    gen:
      go:
        package: "gen"
        out: "gen"
        sql_package: "pgx/v5"
        emit_db_tags: true
        emit_prepared_queries: true
        emit_interface: true
        emit_json_tags: true
        overrides:
          - db_type: "jsonb"
            nullable: true
            go_type:
              import: "github.com/Gooowan/matchup/modules/core/types"
              package: "types"
              type: "JSONB"
          - db_type: "jsonb"
            go_type:
              import: "github.com/Gooowan/matchup/modules/core/types"
              package: "types"
              type: "JSONB" 
