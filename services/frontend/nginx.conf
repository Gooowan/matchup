user root;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    server {
        listen 8080;
        server_name _;
        absolute_redirect off;
        root /usr/share/nginx/html;
        index index.html 200.html;

        # Security headers applied to all responses.
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(self), microphone=(), camera=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://accounts.google.com; style-src 'self' 'unsafe-inline' https://cdn-uicons.flaticon.com https://unpkg.com https://fonts.googleapis.com; font-src 'self' https://cdn-uicons.flaticon.com https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https:; frame-src https://accounts.google.com; object-src 'none'; base-uri 'self';" always;

        location /_app/immutable/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Proxy MinIO buckets so avatar/media URLs are publicly reachable.
        # Internal MinIO is not exposed to the internet; nginx bridges the gap.
        location ~ ^/(avatars|matchup|photos)/ {
            proxy_pass http://172.71.0.7:9000;
            proxy_set_header Host $host;
            proxy_hide_header x-amz-id-2;
            proxy_hide_header x-amz-request-id;
            add_header Cache-Control "public, max-age=31536000";
            add_header X-Robots-Tag "noindex";
        }

        # SvelteKit __data.json fallback for dynamic (non-prerendered) routes.
        # When the SPA navigates to a dynamic segment (e.g. /chats/[id],
        # /profiles/[userId]) no pre-built __data.json exists.  Instead of
        # falling through to 200.html (which is HTML, not JSON), we redirect
        # to the nearest pre-built parent's __data.json so SvelteKit still
        # receives valid JSON and the onMount API calls proceed normally.
        location ~* ^(/[^/]+)/[^/]+/__data\.json {
            # e.g. /chats/290a7abc…/__data.json  →  /chats/__data.json
            rewrite ^(/[^/]+)/[^/]+/__data\.json $1/__data.json last;
        }

        location / {
            try_files $uri $uri/index.html $uri.html /200.html;
        }
    }
}
