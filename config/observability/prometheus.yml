global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: matchup-api
    static_configs:
      - targets: ['api:8000']
    metrics_path: /metrics
    authorization:
      type: Bearer
      credentials_file: /etc/prometheus/metrics_token

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
