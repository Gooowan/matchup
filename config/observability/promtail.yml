server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.+)'
        target_label: container
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: service
      - source_labels: ['__meta_docker_container_label_com_docker_compose_project']
        target_label: project
    pipeline_stages:
      # Parse JSON log lines emitted by slog.NewJSONHandler
      - json:
          expressions:
            level: level
            request_id: request_id
            trace_id: trace_id
            user_id: user_id
            msg: msg
      # Promote extracted fields as Loki labels for efficient filtering
      - labels:
          level:
          service:
      # Keep trace_id and request_id as structured metadata (not labels — too high cardinality)
      - structured_metadata:
          trace_id:
          request_id:
